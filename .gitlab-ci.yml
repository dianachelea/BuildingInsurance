stages:
  - build
  - test

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

before_script:
  - dotnet --info

build:
  stage: build
  script:
    - echo "restore"
    - dotnet restore
    - echo "build"
    - dotnet build -c Release --no-restore

test:
  stage: test
  needs: ["build"]
  script:
    - echo "restore"
    - dotnet restore
    - echo "build release"
    - dotnet build -c Release --no-restore

    - echo "=== TEST + COVERAGE (exclude Integration + exclude Migrations) ==="
    - |
      dotnet test -c Release --no-build --verbosity normal `
        --logger "trx;LogFileName=test_results.trx" `
        --collect "XPlat Code Coverage" `
        --results-directory TestResults `
        --filter "Category!=Integration" `
        --settings coverlet.runsettings

    - |
      $coverageFile = Get-ChildItem -Recurse -Filter "coverage.cobertura.xml" -Path "TestResults" | Select-Object -First 1
      if (-not $coverageFile) { throw "coverage.cobertura.xml not found under TestResults" }
      [xml]$xml = Get-Content $coverageFile.FullName -Raw
      $lineRate = [double]$xml.coverage.'line-rate'
      $percent = [math]::Round($lineRate * 100, 2)
      Write-Host ("Line coverage: {0}%" -f $percent)

  coverage: '/Line coverage:\s+(\d+(?:\.\d+)?)%/'

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - TestResults/
      - "**/TestResults/*.trx"
      - "**/TestResults/**/coverage.cobertura.xml"
      - "coverlet.runsettings"